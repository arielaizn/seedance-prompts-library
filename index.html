<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ספריית פרומפטים Seedance 2.0 — PixMind Studio</title>
  <meta name="description" content="49 פרומפטים אמיתיים מ-X עם וידאו דוגמה לכל אחד — בחינם."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0a;--fg:#fafafa;--accent:#dfe104;--accent-fg:#000;--muted:#737373;--border:#262626;--card:#141414}
    html,body{background:var(--bg);color:var(--fg);font-family:'Heebo',sans-serif;min-height:100vh}
    header{border-bottom:1px solid var(--border);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .logo{font-size:14px;font-weight:700;color:var(--fg);text-decoration:none;letter-spacing:1px}
    .logo span{color:var(--accent)}
    .back{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 16px;font-size:12px;text-decoration:none;transition:.15s}
    .back:hover{color:var(--fg);border-color:var(--fg)}
    .hero{padding:80px 40px 48px;border-bottom:1px solid var(--border)}
    .eyebrow{font-size:12px;letter-spacing:1.2px;color:var(--accent);margin-bottom:16px}
    h1{font-size:clamp(28px,5vw,52px);font-weight:900;line-height:1.1;letter-spacing:-1px;margin-bottom:16px}
    .sub{font-size:16px;color:var(--muted);line-height:1.7;max-width:560px}
    .stats{margin-top:24px;display:flex;gap:32px;flex-wrap:wrap}
    .stat{display:flex;flex-direction:column;gap:4px}
    .stat-n{font-size:28px;font-weight:900}
    .stat-l{font-size:11px;letter-spacing:1px;color:var(--muted)}
    .controls{padding:24px 40px;border-bottom:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .filters{display:flex;gap:8px;flex-wrap:wrap}
    .fb{background:transparent;color:var(--muted);border:1px solid var(--border);padding:6px 14px;font-size:12px;font-family:'Heebo',sans-serif;cursor:pointer;transition:.15s}
    .fb.active{background:var(--accent);color:var(--accent-fg);border-color:var(--accent);font-weight:700}
    .fb:hover:not(.active){border-color:var(--fg);color:var(--fg)}
    .search{background:var(--card);border:1px solid var(--border);color:var(--fg);padding:10px 16px;font-size:13px;font-family:'Heebo',sans-serif;outline:none;width:220px;transition:.15s}
    .search:focus{border-color:var(--accent)}
    .search::placeholder{color:var(--muted)}
    .grid-wrap{padding:32px 40px}
    .rc{font-size:12px;color:var(--muted);margin-bottom:20px}
    #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
    .card{background:var(--card);border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:border-color .15s}
    .card:hover{border-color:#3a3a3a}
    /* Video — autoplay on hover, no controls */
    .vthumb{width:100%;aspect-ratio:16/9;background:#111;position:relative;overflow:hidden}
    .vthumb video{width:100%;height:100%;object-fit:cover;display:block;cursor:default}
    .badge-src{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.75);border:1px solid var(--border);padding:2px 8px;font-size:10px;color:var(--muted);pointer-events:none}
    .mute-btn{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.2);color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;z-index:10;transition:.15s;user-select:none;padding:0}
    .mute-btn:hover{background:rgba(0,0,0,.95);border-color:#dfe104}
    .no-vid-link{width:100%;aspect-ratio:16/9;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-decoration:none;border-bottom:1px solid var(--border)}
    .no-vid-link:hover{background:#1a1a1a}
    .cbody{padding:18px;display:flex;flex-direction:column;gap:10px;flex:1}
    .ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
    .ctitle{font-size:15px;font-weight:700;line-height:1.4}
    .diff{font-size:10px;border:1px solid;padding:2px 7px;white-space:nowrap;flex-shrink:0}
    .diff.beginner{color:#4ade80;border-color:#4ade80}
    .diff.intermediate{color:var(--accent);border-color:var(--accent)}
    .diff.advanced{color:#f97316;border-color:#f97316}
    .diff.expert{color:#ef4444;border-color:#ef4444}
    .cprompt{font-size:12px;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1}
    .cfoot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:12px;gap:6px}
    .cmeta{display:flex;flex-direction:column;gap:2px}
    .ccat{font-size:11px;color:var(--muted)}
    .cauthor{font-size:11px;color:#4ade80}
    .cactions{display:flex;gap:6px}
    .copybtn{background:var(--accent);color:var(--accent-fg);border:none;padding:6px 13px;font-size:11px;font-weight:700;font-family:'Heebo',sans-serif;cursor:pointer;white-space:nowrap;transition:.15s}
    .copybtn:hover{opacity:.85}
    .copybtn.ok{background:#4ade80}
    .xbtn{background:transparent;color:var(--muted);border:1px solid var(--border);padding:6px 9px;font-size:12px;text-decoration:none;display:flex;align-items:center;transition:.15s}
    .xbtn:hover{color:var(--fg);border-color:var(--fg)}
    .empty{text-align:center;padding:80px 20px;color:var(--muted);grid-column:1/-1}
    .spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .6s linear infinite;margin:80px auto;grid-column:1/-1}
    @keyframes sp{to{transform:rotate(360deg)}}
    footer{border-top:1px solid var(--border);padding:28px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
    footer p{font-size:12px;color:var(--muted)}
    footer a{color:var(--accent);text-decoration:none}
    @media(max-width:640px){header,.controls,.grid-wrap,.hero{padding-left:20px;padding-right:20px}h1{font-size:28px}.search{width:100%}}
  

</style>
</head>
<body>
<header>
  <a href="https://arielaizenshtat.com" class="logo">PIXMIND <span>STUDIO</span></a>
  <a href="https://arielaizenshtat.com/guides/seedance-2-prompt-engineering-guide" class="back">← חזרה למדריך</a>
</header>

<section class="hero">
  <p class="eyebrow">// פרומפטים אמיתיים מ-X</p>
  <h1>Seedance 2.0<br/>Prompt Library</h1>
  <p class="sub">פרומפטים אמיתיים שנשלפו מ-X עם וידאו דוגמה של התוצאה — רק מה שעבד. לשימוש חופשי.</p>
  <div class="stats">
    <div class="stat"><span class="stat-n" id="tc">18</span><span class="stat-l">פרומפטים</span></div>
    <div class="stat"><span class="stat-n">8</span><span class="stat-l">קטגוריות</span></div>
    <div class="stat"><span class="stat-n">100%</span><span class="stat-l">חינם</span></div>
  </div>
</section>

<div class="controls">
  <div class="filters">
    <button class="fb active" onclick="fc('all',this)">הכל</button>
    <button class="fb" onclick="fc('cinematic',this)">Cinematic</button>
    <button class="fb" onclick="fc('action',this)">Action</button>
    <button class="fb" onclick="fc('freeze',this)">Freeze</button>
    <button class="fb" onclick="fc('nature',this)">Nature</button>
    <button class="fb" onclick="fc('urban',this)">Urban</button>
    <button class="fb" onclick="fc('reference-image',this)">Reference</button>
    <button class="fb" onclick="fc('abstract',this)">Abstract</button>
    <button class="fb" onclick="fc('advanced-technique',this)">Advanced</button>
  </div>
  <input class="search" type="text" id="si" placeholder="חיפוש..." oninput="af()"/>
</div>

<div class="grid-wrap">
  <p class="rc" id="rc"></p>
  <div id="grid"><div class="spin"></div></div>
</div>

<footer>
  <p>נבנה על ידי <a href="https://arielaizenshtat.com">אריאל איזנשטט — PixMind Studio</a></p>
  <p>Seedance 2.0 by ByteDance</p>
</footer>

<script>
var A='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiY21wdmxwdXB5aHFyeXh0amhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTU3NDMsImV4cCI6MjA5MTgzMTc0M30.UWbnWMVmEl1ZbGa3r0w3WacPbJQ3A39wFraypn_u24k',S='https://qbcmpvlpupyhqryxtjhs.supabase.co',_d=[],_c='all';

fetch(S+'/rest/v1/prompts?select=*&order=created_at.desc',{headers:{'apikey':A,'Authorization':'Bearer '+A}})
.then(r=>r.json()).then(d=>{_d=d;document.getElementById('tc').textContent=d.length;rp(d);})
.catch(()=>{document.getElementById('grid').innerHTML='<p class="empty">שגיאה בטעינה</p>';});

function rp(list){
  var g=document.getElementById('grid');
  document.getElementById('rc').textContent=list.length+' פרומפטים';
  if(!list.length){g.innerHTML='<p class="empty">לא נמצאו פרומפטים</p>';return;}
  g.innerHTML=list.map(p=>{
    var diff=p.difficulty||'beginner';
    var sp=(p.prompt||'').replace(/"/g,'&quot;').replace(/\n/g,' ');
    var short=(p.prompt||'').substring(0,160)+((p.prompt||'').length>160?'...':'');
    var vid=p.preview_video_url
      ?'<div class="vthumb" id="vt_'+p.id+'"><video id="v_'+p.id+'" src="'+p.preview_video_url+'" preload="metadata" loop playsinline muted></video><button class="mute-btn" id="mb_'+p.id+'" onclick="toggleMute(event,&quot;'+p.id+'&quot;)" title="הדלק סאונד">🔇</button><span class="badge-src">𝕏</span></div>'
      :(p.tweet_url?'<a href="'+p.tweet_url+'" target="_blank" class="no-vid-link"><span style="font-size:24px">𝕏</span><span style="font-size:12px;color:var(--muted);">צפה בוידאו המקורי</span></a>':'<div style="width:100%;aspect-ratio:16/9;background:#111;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;">אין וידאו</div>');
    var xb=p.tweet_url?'<a href="'+p.tweet_url+'" target="_blank" class="xbtn">𝕏</a>':'';
    return '<div class="card">'+vid+'<div class="cbody"><div class="ctop"><h3 class="ctitle">'+(p.title||'')+'</h3><span class="diff '+diff+'">'+diff+'</span></div><p class="cprompt">'+short+'</p><div class="cfoot"><div class="cmeta"><span class="ccat">// '+(p.category||'')+'</span>'+(p.author?'<span class="cauthor">'+p.author+'</span>':'')+'</div><div class="cactions">'+xb+'<button class="copybtn" data-p="'+sp+'" onclick="cp(this)">העתק</button></div></div></div></div>';
  }).join('');
  // Lazy load + autoplay on hover
  var io=new IntersectionObserver(function(entries){
    entries.forEach(e=>{
      var v=e.target.querySelector('video');
      if(!v) return;
      if(e.isIntersecting){
        if(!v.getAttribute('data-loaded')){v.setAttribute('data-loaded','1');v.load();}
      } else {
        v.pause();
      }
    });
  },{rootMargin:'100px'});
  document.querySelectorAll('.vthumb').forEach(function(el){
    io.observe(el);
    var v=el.querySelector('video');
    if(!v) return;
    el.addEventListener('mouseenter',function(){v.muted=true;v.play().catch(function(){});});
    el.addEventListener('mouseleave',function(){v.pause();v.currentTime=0;v.muted=true;});
    // Mobile: tap to play/pause
    el.addEventListener('click',function(e){if(e.target.classList.contains('mute-btn'))return;if(v.paused){v.muted=true;v.play().catch(function(){});}else{v.pause();}});
  });
}


function toggleMute(e,id){
  e.stopPropagation();
  var v=document.getElementById('v_'+id);
  var b=document.getElementById('mb_'+id);
  if(!v)return;
  v.muted=!v.muted;
  if(!v.muted&&v.paused){v.play().catch(function(){v.muted=true;});}
  b.textContent=v.muted?'🔇':'🔊';
  b.title=v.muted?'הדלק סאונד':'כבה סאונד';
}
function cp(btn){navigator.clipboard.writeText(btn.getAttribute('data-p')).then(()=>{btn.textContent='✓ הועתק!';btn.classList.add('ok');setTimeout(()=>{btn.textContent='העתק';btn.classList.remove('ok');},2000);});}
function fc(cat,btn){_c=cat;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');af();}
function af(){var q=(document.getElementById('si').value||'').toLowerCase();var f=_d.filter(p=>(_c==='all'||p.category===_c)&&(!q||(p.title||'').toLowerCase().includes(q)||(p.prompt||'').toLowerCase().includes(q)));rp(f);}
</script>
</body>
</html>
